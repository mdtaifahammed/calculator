
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="calc">
        <div class="display-screen">
           <input class="screen" readonly></input>
        </div>
        <div class="input-box-container">
            <button class="box" style="grid-area: box-1;" onclick="clearScreen()">AC</button>
            <button class="box operator" style="grid-area: box-2;" onclick="appendToScreen('%')"><i class="fa-solid fa-percent"></i></button>
            <button class="box" style="grid-area: box-3;" onclick="backspace()"><i class="fa-solid fa-delete-left"></i></button>
            <button class="box operator" style="grid-area: box-4;" onclick="appendToScreen('/')"><i class="fa-solid fa-divide"></i></button>
            <button class="box" style="grid-area: box-5;" onclick="appendToScreen('7')">7</button>
            <button class="box" style="grid-area: box-6;" onclick="appendToScreen('8')">8</button>
            <button class="box" style="grid-area: box-7;" onclick="appendToScreen('9')">9</button>
            <button class="box operator" style="grid-area: box-8;" onclick="appendToScreen('*')"><i class="fa-solid fa-xmark"></i></button>
            <button class="box" style="grid-area: box-9;" onclick="appendToScreen('4')">4</button>
            <button class="box" style="grid-area: box-10;" onclick="appendToScreen('5')">5</button>
            <button class="box" style="grid-area: box-11;" onclick="appendToScreen('6')">6</button>
            <button class="box operator" style="grid-area: box-12;" onclick="appendToScreen('-')"><i class="fa-solid fa-minus"></i></button>
            <button class="box" style="grid-area: box-13;" onclick="appendToScreen('1')">1</button>
            <button class="box" style="grid-area: box-14;" onclick="appendToScreen('2')">2</button>
            <button class="box" style="grid-area: box-15;" onclick="appendToScreen('3')">3</button>
            <button class="box operator" style="grid-area: box-16;" onclick="appendToScreen('+')"><i class="fa-solid fa-plus"></i></button>
            <button class="box" style="grid-area: box-17;" onclick="appendToScreen('00')">00</button>
            <button class="box" style="grid-area: box-18;" onclick="appendToScreen('0')">0</button>
            <button class="box" style="grid-area: box-19; font-weight: 900;" onclick="appendToScreen('.')">.</button>
            <button class="box" style="grid-area: box-20;" onclick="calculate()"><i class="fa-solid fa-equals"></i></button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
